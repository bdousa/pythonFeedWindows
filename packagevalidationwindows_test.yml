trigger: none  # Manual runs only

# Custom build name to show package being validated
name: '$(PackageName)_$(PackageVersion)_$(Date:yyyyMMdd).$(Rev:r)'

parameters:
- name: PackageName
  displayName: 'Python Package Name'
  type: string
  default: ''
- name: PackageVersion
  displayName: 'Package Version (leave blank or use "latest" for newest version)'
  type: string
  default: 'latest'

variables:
  PackageName: '${{ parameters.PackageName }}'      # Pipeline parameter - prompted at runtime
  PackageVersion: '${{ parameters.PackageVersion }}' # Pipeline parameter - prompted at runtime
  GitHubToken: '$(GITHUB_TOKEN)'      # GitHub classic token for package storage
  GitHubOrg: 'bdousa'                 # GitHub organization
  GitHubRepo: 'pythonFeedWindows'     # GitHub repository for validated Windows packages
  SnykToken: '$(SNYK_TOKEN)'  # Set in pipeline library as secret
  SnykOrg: 'dd708fa2-2855-44fe-ac66-97088e5318b0'  # Snyk organization ID

stages:
- stage: SecurityScan
  displayName: "Security Vetting Stage"
  jobs:
  - job: Scan
    displayName: "Download Package and Run Security Scans"
    pool:
      vmImage: 'windows-latest'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.13'

    # Setup Python virtual environment
    - script: |
        python -m venv venv
        venv\Scripts\activate
        python -m pip install --upgrade pip setuptools wheel
      displayName: "Setup Python virtual environment"

    # Download, install and extract package + dependencies for comprehensive scanning
    - task: PowerShell@2
      displayName: "Download, install and extract package + dependencies"
      inputs:
        targetType: 'inline'
        script: |
          venv\Scripts\activate
          mkdir package_download
          mkdir package_extracted
          
          # Download the package and all dependencies
          if ("$(PackageVersion)" -eq "" -or "$(PackageVersion)" -eq "latest") {
            pip download $(PackageName) --dest package_download
          } else {
            pip download $(PackageName)==$(PackageVersion) --dest package_download
          }
          
          # Install the package to get all runtime dependencies
          Write-Host "Installing $(PackageName) and dependencies..."
          if ("$(PackageVersion)" -eq "" -or "$(PackageVersion)" -eq "latest") {
            pip install $(PackageName)
          } else {
            pip install $(PackageName)==$(PackageVersion)
          }
          
          # Extract all downloaded packages for source code scanning
          cd package_download
          Get-ChildItem | ForEach-Object {
            Write-Host "Extracting: $($_.Name)"
            if ($_.Name -like "*.whl") {
              # Rename .whl to .zip temporarily for extraction
              $tempZipName = $_.Name -replace '\.whl$', '.zip'
              Copy-Item $_.Name $tempZipName
              try {
                Expand-Archive -Path $tempZipName -DestinationPath "..\package_extracted\$($_.Name)-extracted" -Force
                Remove-Item $tempZipName -Force
              } catch {
                Write-Host "Warning: Could not extract $($_.Name) - $($_.Exception.Message)"
                Remove-Item $tempZipName -Force -ErrorAction SilentlyContinue
              }
            } elseif ($_.Name -like "*.tar.gz") {
              # Use 7-Zip or tar command if available on Windows agent
              try {
                tar -xzf $_.Name -C "..\package_extracted"
              } catch {
                Write-Host "Warning: Could not extract $($_.Name) - $($_.Exception.Message)"
              }
            }
          }
          
          cd ..
          Write-Host "Package extraction completed. Directory structure:"
          Get-ChildItem -Path package_extracted -Directory -Recurse -Depth 1

    # Install Node.js and Snyk CLI, then run comprehensive scanning
    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: "Install Node.js for Snyk"

    - task: PowerShell@2
      displayName: "Run comprehensive Snyk scanning (dependencies + source code)"
      inputs:
        targetType: 'inline'
        script: |
          npm install -g snyk
          snyk auth $(SnykToken)
          
          # Verify authentication and organization access
          snyk auth $(SnykToken)
          
          # Generate requirements.txt AFTER installing the package and all dependencies
          venv\Scripts\activate
          pip freeze > requirements.txt
          Write-Host "=== Installed packages for scanning ==="
          Get-Content requirements.txt
          $lineCount = (Get-Content requirements.txt | Measure-Object -Line).Lines
          Write-Host "=== Total packages: $lineCount ==="
          
          # Scan requirements for known vulnerabilities
          Write-Host "=== Scanning dependencies for known vulnerabilities ==="
          try { 
            snyk test --file=requirements.txt --org=$(SnykOrg) > snyk_dependencies_summary.txt 
            Write-Host "✅ Dependency scan completed successfully"
          } catch { 
            Write-Host "⚠️ Snyk dependency test completed with issues: $($_.Exception.Message)"
            Write-Host "Exit code: $($_.Exception.HResult)"
          }
          
          # Monitor dependencies in Snyk dashboard (this uploads to UI)
          Write-Host "=== Uploading dependency scan to Snyk dashboard ==="
          try { 
            snyk monitor --file=requirements.txt --org=$(SnykOrg) --project-name="$(PackageName)-deps-$(Build.BuildNumber)" 
            Write-Host "✅ Dashboard upload completed successfully"
          } catch { 
            Write-Host "⚠️ Snyk monitor completed with issues: $($_.Exception.Message)"
            Write-Host "Exit code: $($_.Exception.HResult)"
          }
          
          # Scan extracted source code for security issues
          Write-Host "=== Scanning source code for security vulnerabilities ==="
          try { 
            snyk code test package_extracted --org=$(SnykOrg) > snyk_code_summary.txt 
            Write-Host "✅ Source code scan completed successfully"
          } catch { 
            Write-Host "⚠️ Snyk code test completed with issues: $($_.Exception.Message)"
            Write-Host "Exit code: $($_.Exception.HResult)"
            Write-Host "This may be normal if vulnerabilities were found or if code analysis isn't available for this package type"
          }
          
          # Reset exit code to ensure pipeline continues
          $LASTEXITCODE = 0
          Write-Host "✅ Security scanning stage completed successfully"


    # Create comprehensive approval summary with package analysis for manual reviewers
    - task: PowerShell@2
      displayName: "📋 Ready for Manual Approval - Review Instructions"
      inputs:
        targetType: 'inline'
        script: |
          venv\Scripts\activate
          pip install requests
          
          Write-Host "=========================================="
          Write-Host "  PACKAGE READY FOR SECURITY REVIEW"
          Write-Host "=========================================="
          Write-Host "Package: $(PackageName)"
          Write-Host "Version: $(PackageVersion)"
          Write-Host "Build: $(Build.BuildNumber)"
          Write-Host ""
          
          # Set environment variable for Python script
          $env:PACKAGE_NAME = "$(PackageName)"
          
          # Create a simple Python script file to avoid here-string issues
          $pythonScript = @'
          import requests
          import json
          import os
          from datetime import datetime, timezone

          def safe_parse_datetime(dt_string):
              """Safely parse datetime string and ensure it is timezone-aware"""
              if not dt_string:
                  return None
              try:
                  if dt_string.endswith('Z'):
                      dt_string = dt_string[:-1] + '+00:00'
                  dt = datetime.fromisoformat(dt_string)
                  if dt.tzinfo is None:
                      dt = dt.replace(tzinfo=timezone.utc)
                  return dt
              except Exception:
                  return None

          package_name = os.environ.get('PACKAGE_NAME', '')

          if not package_name:
              print("ERROR: No package name provided for analysis")
              exit(0)

          package_name = package_name.replace('_', '-')

          print("PACKAGE ANALYSIS:")
          print("=" * 40)

          try:
              response = requests.get(f"https://pypi.org/pypi/{package_name}/json", timeout=30)
              if response.status_code != 200:
                  print(f"WARNING: Package not found on PyPI: {package_name}")
                  exit(0)
              
              data = response.json()
              info = data['info']
              releases = data['releases']
              
              print(f"Name: {info['name']}")
              print(f"Latest Version: {info['version']}")
              print(f"Summary: {info['summary'][:80]}..." if len(info['summary']) > 80 else f"Summary: {info['summary']}")
              print(f"Author: {info['author'] or 'Not specified'}")
              print(f"Maintainer: {info['maintainer'] if info['maintainer'] else 'Same as author'}")
              
              license_info = info.get('license', 'Not specified')
              classifiers = info.get('classifiers', [])
              license_classifiers = [c for c in classifiers if c.startswith('License ::')]
              
              print(f"License: {license_info}")
              if license_classifiers:
                  for classifier in license_classifiers[:2]:
                      license_name = classifier.split('::')[-1].strip()
                      print(f"    Classifier: {license_name}")
              
              problematic_indicators = ['gpl', 'agpl', 'copyleft', 'viral']
              license_text = ''
              if license_info:
                  license_text += license_info.lower()
              if license_classifiers:
                  license_text += ' ' + ' '.join(license_classifiers).lower()
              
              if license_text and any(indicator in license_text for indicator in problematic_indicators):
                  print("WARNING: Potentially restrictive license detected!")
              
              os_classifiers = [c for c in classifiers if c.startswith('Operating System ::')]
              print(f"Operating System Compatibility:")
              
              if os_classifiers:
                  for os_classifier in os_classifiers:
                      os_name = os_classifier.split('::')[-1].strip() if '::' in os_classifier else os_classifier
                      print(f"    {os_name}")
                  
                  windows_specific = any('Microsoft' in c and 'Windows' in c for c in os_classifiers)
                  os_independent = any('OS Independent' in c for c in os_classifiers)
                  
                  if windows_specific:
                      print("OK: Package supports Windows (excellent for Windows pipeline)")
                  elif os_independent:
                      print("OK: Package is OS Independent (recommended)")
                  else:
                      print("CAUTION: Package has specific OS requirements - review carefully")
              else:
                  print("    UNKNOWN: No OS compatibility information specified")
                  print("WARNING: Packages without OS compatibility info should be reviewed carefully")
              
              latest_release_time = None
              first_release_time = None
              
              if releases:
                  all_upload_times = []
                  for version, files in releases.items():
                      if files:
                          for file_info in files:
                              upload_time_str = file_info.get('upload_time', '')
                              upload_time = safe_parse_datetime(upload_time_str)
                              if upload_time:
                                  all_upload_times.append(upload_time)
                  
                  if all_upload_times:
                      all_upload_times.sort()
                      first_release_time = all_upload_times[0]
                      latest_release_time = all_upload_times[-1]
                      
                      now_utc = datetime.now(timezone.utc)
                      days_ago = (now_utc - latest_release_time).days
                      print(f"Last Release: {latest_release_time.strftime('%Y-%m-%d')} ({days_ago} days ago)")
                      
                      six_months_ago = datetime.now(timezone.utc).replace(month=datetime.now(timezone.utc).month-6 if datetime.now(timezone.utc).month > 6 else datetime.now(timezone.utc).month+6)
                      recent_count = len([t for t in all_upload_times if t > six_months_ago])
                      print(f"Recent Activity: {recent_count} releases in last 6 months")
              
              repo_urls = []
              for url_type in ['home_page', 'download_url', 'project_url']:
                  url = info.get(url_type)
                  if url and ('github.com' in url or 'gitlab.com' in url or 'bitbucket.org' in url):
                      repo_urls.append(url)
              
              if info.get('project_urls'):
                  for key, url in info['project_urls'].items():
                      if url and ('github.com' in url or 'gitlab.com' in url or 'bitbucket.org' in url):
                          repo_urls.append(url)
              
              if repo_urls:
                  print(f"Repository: {repo_urls[0]}")
              else:
                  print(f"Repository: https://pypi.org/project/{package_name}/ (PyPI page)")
              
              print("\nSECURITY RISK ASSESSMENT:")
              print("-" * 30)
              
              if first_release_time:
                  now_utc = datetime.now(timezone.utc)
                  package_age_days = (now_utc - first_release_time).days
                  print(f"Package Age: {package_age_days} days ({package_age_days//365} years)")
                  
                  if package_age_days < 90:
                      print("WARNING: Very new package (less than 3 months old)")
                  elif package_age_days < 365:
                      print("CAUTION: Relatively new package (less than 1 year old)")
                  else:
                      print("OK: Mature package (1+ years old)")
              
              if latest_release_time:
                  now_utc = datetime.now(timezone.utc)
                  days_since_last = (now_utc - latest_release_time).days
                  
                  if days_since_last > 365:
                      print("CRITICAL: Package not updated in over a year")
                  elif days_since_last > 180:
                      print("WARNING: Package not updated in over 6 months")
                  elif days_since_last > 90:
                      print("CAUTION: Package not updated in over 3 months")
                  else:
                      print("OK: Recently maintained package")

          except requests.exceptions.RequestException as e:
              print(f"ERROR: Error fetching package metadata: {e}")
          except Exception as e:
              print(f"ERROR: Unexpected error during analysis: {e}")

          print("=" * 40)
          '@
          
          # Write the Python script to a temporary file
          $pythonScript | Out-File -FilePath "package_analysis.py" -Encoding UTF8
          
          # Run the Python script
          python package_analysis.py
          
          Write-Host ""
          Write-Host "SECURITY SCAN RESULTS:"
          Write-Host "========================================"
          
          # Show basic dependency information
          Write-Host "DEPENDENCY OVERVIEW:"
          if (Test-Path "requirements.txt") {
            # Filter out build tools and count actual dependencies
            $allDeps = Get-Content requirements.txt | Where-Object { $_ -match '^[a-zA-Z]' }
            $filteredDeps = $allDeps | Where-Object { 
              $_ -notmatch "^$(PackageName)" -and 
              $_ -notmatch "^setuptools" -and 
              $_ -notmatch "^wheel" -and 
              $_ -notmatch "^pip" 
            }
            
            $actualDepCount = $filteredDeps.Count
            $totalDeps = $actualDepCount + 1  # Add 1 for the main package
            
            Write-Host "   📊 Total dependencies to review: $totalDeps"
            Write-Host "   📋 Package being reviewed: $(PackageName)"
            if ($actualDepCount -gt 0) {
              Write-Host "   🔍 Additional dependencies found:"
              $filteredDeps | Select-Object -First 10 | ForEach-Object {
                $depName = ($_ -split '[<>=!]')[0]
                Write-Host "      - $depName"
              }
              if ($actualDepCount -gt 10) {
                Write-Host "      ... and $($actualDepCount - 10) more"
              }
            } else {
              Write-Host "   ✅ No additional dependencies required"
            }
            Write-Host ""
          } else {
            Write-Host "❓ Requirements file not available for dependency analysis"
            Write-Host ""
          }
          
          # Display Snyk dependency scan results
          Write-Host "📦 PACKAGE VULNERABILITIES:"
          if (Test-Path "snyk_dependencies_summary.txt") {
            Write-Host "Raw Snyk CLI output:"
            Write-Host "----------------------------------------"
            Get-Content snyk_dependencies_summary.txt
            Write-Host "----------------------------------------"
          } else {
            Write-Host "❓ Package vulnerability scan not available"
          }
          
          Write-Host ""
          Write-Host "🔍 SOURCE CODE ANALYSIS:"
          if (Test-Path "snyk_code_summary.txt") {
            Write-Host "Raw Snyk CLI output:"
            Write-Host "----------------------------------------"
            Get-Content snyk_code_summary.txt
            Write-Host "----------------------------------------"
          } else {
            Write-Host "❓ Source code analysis not available"
          }
          
          Write-Host "========================================"
          
          Write-Host ""
          Write-Host "📊 REVIEW RESOURCES:"
          Write-Host "- Check Snyk Dashboard: https://app.snyk.io/org/3rd-party-libraries-hQjhi8axinJ5KfgUgTFtFq"
          Write-Host "- Search for project: /bdousa/AS - DevOps and Cloud/_git/PythonPackageValidation"
          Write-Host ""
          Write-Host "⏳ NEXT: Manual approval required in PackageApproval environment"
          Write-Host "========================================"
          
          # Reset exit code to ensure pipeline continues
          $LASTEXITCODE = 0
          Write-Host "✅ Manual approval summary completed successfully"


- stage: ManualApproval
  displayName: "Manual Approval"
  dependsOn: SecurityScan
  condition: succeeded()
  jobs:
  - deployment: ApprovalGate
    environment: PackageApproval
    strategy:
      runOnce:
        deploy:
          steps: []

- stage: PublishArtifact
  displayName: "Publish Package to GitHub Repository"
  dependsOn: ManualApproval
  condition: succeeded()
  jobs:
  - job: Publish
    pool:
      vmImage: 'windows-latest'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.13'
        
    - task: PowerShell@2
      displayName: "Upload to GitHub Releases"
      inputs:
        targetType: 'inline'
        script: |
          # Install GitHub CLI for Windows using Chocolatey (available on Azure agents)
          Write-Host "Installing GitHub CLI..."
          try {
            choco install gh --yes --no-progress
          } catch {
            Write-Host "Chocolatey failed, trying direct download..."
            # Fallback to direct download
            $ghUrl = "https://github.com/cli/cli/releases/latest/download/gh_windows_amd64.msi"
            Invoke-WebRequest -Uri $ghUrl -OutFile "gh.msi"
            Start-Process msiexec.exe -Wait -ArgumentList '/I gh.msi /quiet'
            Remove-Item "gh.msi"
          }
          
          python -m pip install --upgrade pip setuptools wheel
          mkdir package_publish
          
          # Download packages targeting Python 3.13 64-bit Windows specifically
          Write-Host "Downloading $(PackageName) for Python 3.13 Windows x64..."
          $downloadSuccessful = $false
          
          if ("$(PackageVersion)" -eq "" -or "$(PackageVersion)" -eq "latest") {
            # Try Python 3.13 specific wheels first
            Write-Host "Attempting Python 3.13 specific wheels..."
            try {
              pip download $(PackageName) --dest package_publish "--only-binary=:all:" --python-version 313 --platform win_amd64 2>&1
              # Check if any files were actually downloaded
              $fileCount = (Get-ChildItem package_publish -File -ErrorAction SilentlyContinue | Measure-Object).Count
              if ($fileCount -gt 0) {
                $downloadSuccessful = $true
                Write-Host "✅ Python 3.13 wheels downloaded successfully ($fileCount files)"
              } else {
                Write-Host "⚠️ Python 3.13 wheels command completed but no files downloaded"
              }
            } catch {
              Write-Host "⚠️ Python 3.13 wheels not available: $($_.Exception.Message)"
            }
            
            # Fallback to general Windows wheels if Python 3.13 specific not available
            if (-not $downloadSuccessful) {
              Write-Host "Attempting general Windows wheels..."
              try {
                pip download $(PackageName) --dest package_publish "--only-binary=:all:" --platform win_amd64 2>&1
                # Check if any files were actually downloaded
                $fileCount = (Get-ChildItem package_publish -File -ErrorAction SilentlyContinue | Measure-Object).Count
                if ($fileCount -gt 0) {
                  $downloadSuccessful = $true
                  Write-Host "✅ Windows wheels downloaded successfully ($fileCount files)"
                } else {
                  Write-Host "⚠️ Windows wheels command completed but no files downloaded"
                }
              } catch {
                Write-Host "⚠️ Windows wheels not available: $($_.Exception.Message)"
              }
            }
            
            # Final fallback to source distributions if no wheels available
            if (-not $downloadSuccessful) {
              Write-Host "Attempting source distributions (no wheels available)..."
              try {
                pip download $(PackageName) --dest package_publish --no-binary=:all: 2>&1
                # Check if any files were actually downloaded
                $fileCount = (Get-ChildItem package_publish -File -ErrorAction SilentlyContinue | Measure-Object).Count
                if ($fileCount -gt 0) {
                  $downloadSuccessful = $true
                  Write-Host "✅ Source distributions downloaded successfully ($fileCount files)"
                } else {
                  Write-Host "❌ Source distributions command completed but no files downloaded"
                }
              } catch {
                Write-Host "❌ Failed to download source distributions: $($_.Exception.Message)"
              }
            }
          } else {
            # Try Python 3.13 specific wheels first for specific version
            Write-Host "Attempting Python 3.13 specific wheels for version $(PackageVersion)..."
            try {
              pip download $(PackageName)==$(PackageVersion) --dest package_publish "--only-binary=:all:" --python-version 313 --platform win_amd64 2>&1
              # Check if any files were actually downloaded
              $fileCount = (Get-ChildItem package_publish -File -ErrorAction SilentlyContinue | Measure-Object).Count
              if ($fileCount -gt 0) {
                $downloadSuccessful = $true
                Write-Host "✅ Python 3.13 wheels downloaded successfully ($fileCount files)"
              } else {
                Write-Host "⚠️ Python 3.13 wheels command completed but no files downloaded"
              }
            } catch {
              Write-Host "⚠️ Python 3.13 wheels not available for version $(PackageVersion): $($_.Exception.Message)"
            }
            
            # Fallback to general Windows wheels if Python 3.13 specific not available
            if (-not $downloadSuccessful) {
              Write-Host "Attempting general Windows wheels for version $(PackageVersion)..."
              try {
                pip download $(PackageName)==$(PackageVersion) --dest package_publish "--only-binary=:all:" --platform win_amd64 2>&1
                # Check if any files were actually downloaded
                $fileCount = (Get-ChildItem package_publish -File -ErrorAction SilentlyContinue | Measure-Object).Count
                if ($fileCount -gt 0) {
                  $downloadSuccessful = $true
                  Write-Host "✅ Windows wheels downloaded successfully ($fileCount files)"
                } else {
                  Write-Host "⚠️ Windows wheels command completed but no files downloaded"
                }
              } catch {
                Write-Host "⚠️ Windows wheels not available for version $(PackageVersion): $($_.Exception.Message)"
              }
            }
            
            # Final fallback to source distributions if no wheels available
            if (-not $downloadSuccessful) {
              Write-Host "Attempting source distributions for version $(PackageVersion) (no wheels available)..."
              try {
                pip download $(PackageName)==$(PackageVersion) --dest package_publish --no-binary=:all: 2>&1
                # Check if any files were actually downloaded
                $fileCount = (Get-ChildItem package_publish -File -ErrorAction SilentlyContinue | Measure-Object).Count
                if ($fileCount -gt 0) {
                  $downloadSuccessful = $true
                  Write-Host "✅ Source distributions downloaded successfully ($fileCount files)"
                } else {
                  Write-Host "❌ Source distributions command completed but no files downloaded"
                }
              } catch {
                Write-Host "❌ Failed to download source distributions for version $(PackageVersion): $($_.Exception.Message)"
              }
            }
          }
          
          Write-Host "Download completed. Files ready for upload:"
          Get-ChildItem package_publish
          
          # Check if we have any files to upload
          $fileCount = (Get-ChildItem package_publish -File | Measure-Object).Count
          if ($fileCount -eq 0 -or -not $downloadSuccessful) {
            Write-Host "❌ No files downloaded to upload"
            exit 1
          }
          
          Write-Host "✅ Download successful - $fileCount file(s) ready for upload"
          
          # Set GitHub token as environment variable for authentication
          $env:GH_TOKEN = "$(GitHubToken)"
          
          # Verify token and authentication
          try {
            gh auth status
          } catch {
            Write-Host "❌ GitHub authentication failed - please check token permissions"
            exit 1
          }
          
          # Verify repository access
          try {
            gh repo view "$(GitHubOrg)/$(GitHubRepo)"
          } catch {
            Write-Host "❌ Cannot access repository $(GitHubOrg)/$(GitHubRepo)"
            exit 1
          }
          
          # Extract actual version from downloaded package for cleaner naming
          $actualVersion = ""
          
          # Check if PackageVersion is empty or "latest"
          if ("$(PackageVersion)" -eq "" -or "$(PackageVersion)" -eq "latest") {
            # Try to extract version from wheel file first
            $wheelFile = Get-ChildItem package_publish -Filter "$(PackageName)-*.whl" | Select-Object -First 1
            if ($wheelFile) {
              $filename = $wheelFile.Name
              # Extract version using regex
              if ($filename -match '^[^-]+-([0-9]+\.[0-9]+(?:\.[0-9]+)?[^-]*)-') {
                $actualVersion = $matches[1]
              }
            }
            
            # Fallback to tar.gz if no wheel or version extraction failed
            if (-not $actualVersion) {
              $tarFile = Get-ChildItem package_publish -Filter "$(PackageName)-*.tar.gz" | Select-Object -First 1
              if ($tarFile) {
                $filename = $tarFile.BaseName -replace '\.tar$', ''
                # Extract version after first dash
                $parts = $filename -split '-'
                if ($parts.Length -ge 2) {
                  $actualVersion = $parts[1..($parts.Length-1)] -join '-'
                }
              }
            }
            
            # Final fallback
            if (-not $actualVersion -or $actualVersion -notmatch '[0-9]+\.[0-9]+') {
              $actualVersion = "latest"
            }
          } else {
            $actualVersion = "$(PackageVersion)"
          }
          
          # Create standardized release tag
          if ($actualVersion -and $actualVersion -ne "latest") {
            $releaseTag = "$(PackageName)-v$actualVersion"
            $versionDisplay = $actualVersion
          } else {
            $releaseTag = "$(PackageName)-latest"
            $versionDisplay = "latest"
          }
          
          Write-Host "Preparing GitHub release: $releaseTag"

          # Additive publish policy:
          #   - Never delete prior releases for this package.
          #   - For exact same-version reruns, keep the existing release/assets in place
          #     and only update the JSON manifest entry for that version.
          $tagAlreadyExists = $false
          try {
            gh release view $releaseTag --repo "$(GitHubOrg)/$(GitHubRepo)" | Out-Null
            $tagAlreadyExists = $true
            Write-Host "ℹ️ Release $releaseTag already exists - will not recreate or delete it; manifest entry will be updated in place."
          } catch {
            $tagAlreadyExists = $false
            Write-Host "Release $releaseTag does not exist yet - will create it."
          }

          # URL encode the project name for proper linking
          $encodedProject = "$(System.TeamProject)" -replace ' ', '%20'
          
          # Get list of package files for release notes and install commands
          $packageFiles = Get-ChildItem package_publish -File | ForEach-Object { "- $($_.Name)" }
          $packageFilesList = $packageFiles -join "`n"
          
          # Generate install command with actual wheel filename from private feed
          # Normalize package name for wheel filename matching (hyphens become underscores)
          $normalizedPackageName = "$(PackageName)" -replace '-', '_'
          
          # Try to find the most specific wheel first: Python 3.13 64-bit Windows
          $wheelFiles = Get-ChildItem package_publish -Filter "$normalizedPackageName-*-cp313-cp313-win_amd64.whl" -ErrorAction SilentlyContinue
          if (-not $wheelFiles) {
            $wheelFiles = Get-ChildItem package_publish -Filter "$(PackageName)-*-cp313-cp313-win_amd64.whl" -ErrorAction SilentlyContinue
          }
          
          if ($wheelFiles) {
            $wheelFilename = $wheelFiles[0].Name
            $installCmd = "pip install https://github.com/$(GitHubOrg)/$(GitHubRepo)/releases/download/$releaseTag/$wheelFilename"
            $installType = "Python 3.13 64-bit wheel"
          } else {
            # Try to find any Python 3.13 wheel
            $wheelFiles313 = Get-ChildItem package_publish -Filter "$normalizedPackageName-*-cp313-*.whl" -ErrorAction SilentlyContinue
            if (-not $wheelFiles313) {
              $wheelFiles313 = Get-ChildItem package_publish -Filter "$(PackageName)-*-cp313-*.whl" -ErrorAction SilentlyContinue
            }
            if ($wheelFiles313) {
              $wheelFilename = $wheelFiles313[0].Name
              $installCmd = "pip install https://github.com/$(GitHubOrg)/$(GitHubRepo)/releases/download/$releaseTag/$wheelFilename"
              $installType = "Python 3.13 wheel"
            } else {
              # Try universal wheels (py3-none-any) - these are compatible with Python 3.13 on Windows
              $universalWheel = Get-ChildItem package_publish -Filter "$normalizedPackageName-*-py3-none-any.whl" -ErrorAction SilentlyContinue
              if (-not $universalWheel) {
                $universalWheel = Get-ChildItem package_publish -Filter "$(PackageName)-*-py3-none-any.whl" -ErrorAction SilentlyContinue
              }
              if ($universalWheel) {
                $wheelFilename = $universalWheel[0].Name
                $installCmd = "pip install https://github.com/$(GitHubOrg)/$(GitHubRepo)/releases/download/$releaseTag/$wheelFilename"
                $installType = "Universal wheel (Python 3+)"
              } else {
                # Fallback to any wheel file
                $anyWheel = Get-ChildItem package_publish -Filter "$normalizedPackageName-*.whl" -ErrorAction SilentlyContinue
                if (-not $anyWheel) {
                  $anyWheel = Get-ChildItem package_publish -Filter "$(PackageName)-*.whl" -ErrorAction SilentlyContinue
                }
                if ($anyWheel) {
                  $wheelFilename = $anyWheel[0].Name
                  $installCmd = "pip install https://github.com/$(GitHubOrg)/$(GitHubRepo)/releases/download/$releaseTag/$wheelFilename"
                  $installType = "Wheel (check compatibility)"
                } else {
                  # Use source distribution as final fallback
                  $tarFile = Get-ChildItem package_publish -Filter "$normalizedPackageName-*.tar.gz" -ErrorAction SilentlyContinue
                  if (-not $tarFile) {
                    $tarFile = Get-ChildItem package_publish -Filter "$(PackageName)-*.tar.gz" -ErrorAction SilentlyContinue
                  }
                  if ($tarFile) {
                    $tarFilename = $tarFile[0].Name
                    $installCmd = "pip install https://github.com/$(GitHubOrg)/$(GitHubRepo)/releases/download/$releaseTag/$tarFilename"
                    $installType = "Source distribution"
                  } else {
                    $installCmd = "# No compatible package found"
                    $installType = "None available"
                  }
                }
              }
            }
          }
          
          # Create release notes with direct install command
          $releaseNotes = @"
          🔒 **Security Validated Package**

          **Package:** ``$(PackageName)``
          **Version:** ``$versionDisplay``
          **Validation Date:** $(Get-Date -Format 'yyyy-MM-dd')
          **Pipeline:** [View Build]($(System.TeamFoundationCollectionUri)$encodedProject/_build/results?buildId=$(Build.BuildId))

          ## 📦 Installation (Python 3.13 Required)

          ### Direct from Validated Feed (Recommended)
          ``````bash
          $installCmd
          ``````
          **Package Type:** $installType

          ### Prerequisites
          - Python 3.13.x
          - Windows 64-bit
          - GitHub authentication (see repository README)

          ## 🔒 Security Status
          - ✅ Vulnerability scan passed (Snyk)
          - ✅ Source code analysis completed
          - ✅ Manual security review approved
          - ✅ License compliance verified
          - ✅ Python 3.13 & Windows 64-bit optimized

          ## 📋 Package Files
          $packageFilesList
          "@
          
          # Create release and upload all package files
          $packageFiles = Get-ChildItem package_publish -File | ForEach-Object { $_.FullName }
          $packageFileNames = @(Get-ChildItem package_publish -File | ForEach-Object { $_.Name })
          try {
            if (-not $tagAlreadyExists) {
              Write-Host "Creating GitHub release $releaseTag with files: $($packageFiles -join ', ')"
              gh release create $releaseTag --repo "$(GitHubOrg)/$(GitHubRepo)" --title "✅ $(PackageName) v$versionDisplay - Security Validated" --notes $releaseNotes

              foreach ($file in $packageFiles) {
                Write-Host "Uploading file: $file"
                gh release upload $releaseTag $file --repo "$(GitHubOrg)/$(GitHubRepo)"
              }

              Write-Host "✅ Successfully uploaded packages to GitHub Releases!"
            } else {
              Write-Host "ℹ️ Reusing existing release $releaseTag - skipping gh release create/upload to avoid duplicate assets."
            }
            Write-Host "📦 Release: https://github.com/$(GitHubOrg)/$(GitHubRepo)/releases/tag/$releaseTag"

            # === Update JSON manifest (system of record) and regenerate README from it ===
            Write-Host "Updating packages.json manifest and regenerating README..."

            git clone "https://$(GitHubToken)@github.com/$(GitHubOrg)/$(GitHubRepo).git" temp_repo
            cd temp_repo

            $manifestPath = "packages.json"
            $pkgName        = "$(PackageName)"
            $validationDate = Get-Date -Format 'yyyy-MM-dd'
            $generatedAt    = (Get-Date).ToUniversalTime().ToString("o")
            $pipelineUrl    = "$(System.TeamFoundationCollectionUri)$encodedProject/_build/results?buildId=$(Build.BuildId)"
            $releaseUrl     = "https://github.com/$(GitHubOrg)/$(GitHubRepo)/releases/tag/$releaseTag"

            function Set-ManifestProperty($target, $propertyName, $value) {
              if ($target.PSObject.Properties.Name -contains $propertyName) {
                $target.$propertyName = $value
              } else {
                $target | Add-Member -NotePropertyName $propertyName -NotePropertyValue $value -Force
              }
            }

            # Load existing manifest or create a new one
            $manifest = $null
            if (Test-Path $manifestPath) {
              try {
                $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
              } catch {
                Write-Host "⚠️ Existing packages.json is not valid JSON. Backing up to packages.json.bak and starting fresh."
                Copy-Item $manifestPath "$manifestPath.bak" -Force
                $manifest = $null
              }
            }
            $bootstrapPerformed = $false
            if (-not $manifest) {
              $manifest = [PSCustomObject]@{
                schemaVersion = 1
                generatedAt   = $generatedAt
                packages      = [PSCustomObject]@{}
              }

              # === Bootstrap (only when packages.json is missing) ===
              # Seed the manifest from the embedded bootstrap inventory so the
              # canonical datastore starts with full history instead of a single entry.
              # After this runs once, packages.json is the source of truth and the
              # bootstrap block becomes a no-op unless the repo-backed manifest is missing.
              $bootstrapEntries = @(
                @{ n='deltalake';                  v='1.6.0';    d='2026-05-19'; f='deltalake-1.6.0-cp310-abi3-win_amd64.whl' },
                @{ n='datalake';                   v='2.5.10';   d='2026-05-18'; f='datalake-2.5.10.tar.gz' },
                @{ n='msal';                       v='1.36.0';   d='2026-04-14'; f='msal-1.36.0-py3-none-any.whl' },
                @{ n='fastexcel';                  v='0.19.0';   d='2026-03-04'; f='fastexcel-0.19.0-cp310-abi3-win_amd64.whl' },
                @{ n='reportlab';                  v='4.4.10';   d='2026-02-26'; f='reportlab-4.4.10-py3-none-any.whl' },
                @{ n='ruff';                       v='0.15.2';   d='2026-02-23'; f='ruff-0.15.2-py3-none-win_amd64.whl' },
                @{ n='pytest-cov';                 v='latest';   d='2026-02-23'; f='pytest_cov-7.0.0-py3-none-any.whl';        tag='pytest-cov-latest' },
                @{ n='pytest-asyncio';             v='latest';   d='2026-02-23'; f='pytest_asyncio-1.3.0-py3-none-any.whl';     tag='pytest-asyncio-latest' },
                @{ n='pytest';                     v='9.0.2';    d='2026-02-23'; f='pytest-9.0.2-py3-none-any.whl' },
                @{ n='black';                      v='26.1.0';   d='2026-02-23'; f='black-26.1.0-cp313-cp313-win_amd64.whl' },
                @{ n='azure-identity';             v='latest';   d='2026-02-23'; f='azure_identity-1.25.2-py3-none-any.whl';    tag='azure-identity-latest' },
                @{ n='azure-functions';            v='latest';   d='2026-02-23'; f='azure_functions-1.24.0-py3-none-any.whl';   tag='azure-functions-latest' },
                @{ n='polars';                     v='1.38.1';   d='2026-02-23'; f='polars-1.38.1-py3-none-any.whl' },
                @{ n='xlsxwriter';                 v='3.2.9';    d='2025-10-10'; f='xlsxwriter-3.2.9-py3-none-any.whl' },
                @{ n='pyarrow';                    v='24.0.0';   d='2026-05-28'; f='pyarrow-24.0.0-cp313-cp313-win_amd64.whl' },
                @{ n='sqlalchemy';                 v='2.0.44';   d='2025-10-10'; f='sqlalchemy-2.0.44-cp313-cp313-win_amd64.whl' },
                @{ n='openpyxl';                   v='3.1.5';    d='2025-10-10'; f='openpyxl-3.1.5-py2.py3-none-any.whl' },
                @{ n='seaborn';                    v='0.13.2';   d='2025-10-10'; f='seaborn-0.13.2-py3-none-any.whl' },
                @{ n='pyzt';                       v='0.0.4';    d='2025-10-10'; f='pyzt-0.0.4-py3-none-any.whl' },
                @{ n='pyodbc';                     v='5.2.0';    d='2025-10-10'; f='pyodbc-5.2.0-cp313-cp313-win_amd64.whl' },
                @{ n='pyyaml';                     v='6.0.3';    d='2025-10-10'; f='pyyaml-6.0.3-cp313-cp313-win_amd64.whl' },
                @{ n='uv';                         v='0.8.22';   d='2025-10-01'; f='uv-0.8.22-py3-none-win_amd64.whl' },
                @{ n='pyzipper';                   v='0.3.6';    d='2025-10-01'; f='pyzipper-0.3.6-py2.py3-none-any.whl' },
                @{ n='pyspark';                    v='4.0.0';    d='2025-08-21'; f='pyspark-4.0.0.tar.gz' },
                @{ n='pypdf';                      v='6.0.0';    d='2025-08-21'; f='pypdf-6.0.0-py3-none-any.whl' },
                @{ n='azure-datalake-store';       v='1.0.1';    d='2025-08-21'; f='azure_datalake_store-1.0.1-py2.py3-none-any.whl';      tag='azure-datalake-store-latest' },
                @{ n='azure-keyvault-secrets';     v='4.10.0';   d='2025-08-21'; f='azure_keyvault_secrets-4.10.0-py3-none-any.whl';       tag='azure-keyvault-secrets-latest' },
                @{ n='azure-mgmt-datalake-store';  v='0.5.0';    d='2025-08-21'; f='azure_mgmt_datalake_store-0.5.0-py2.py3-none-any.whl'; tag='azure-mgmt-datalake-store-latest' },
                @{ n='azure-storage-blob';         v='12.26.0';  d='2025-08-21'; f='azure_storage_blob-12.26.0-py3-none-any.whl';          tag='azure-storage-blob-latest' },
                @{ n='lxml';                       v='6.0.0';    d='2025-08-21'; f='lxml-6.0.0-cp313-cp313-win_amd64.whl' },
                @{ n='pillow';                     v='11.3.0';   d='2025-08-21'; f='pillow-11.3.0-cp313-cp313-win_amd64.whl' },
                @{ n='python-dotenv';              v='latest';   d='2025-08-21'; f='python_dotenv-1.1.1-py3-none-any.whl';      tag='python-dotenv-latest' },
                @{ n='pythonnet';                  v='3.0.5';    d='2025-08-21'; f='pythonnet-3.0.5-py3-none-any.whl' },
                @{ n='requests';                   v='2.32.5';   d='2025-08-18'; f='requests-2.32.5-py3-none-any.whl' },
                @{ n='tabula-py';                  v='latest';   d='2025-08-18'; f='tabula_py-2.10.0-py3-none-any.whl';         tag='tabula-py-latest' },
                @{ n='xlrd';                       v='2.0.2';    d='2025-08-18'; f='xlrd-2.0.2-py2.py3-none-any.whl' },
                @{ n='chardet';                    v='5.2.0';    d='2025-08-18'; f='chardet-5.2.0-py3-none-any.whl' },
                @{ n='pytesseract';                v='0.3.13';   d='2025-08-15'; f='pytesseract-0.3.13-py3-none-any.whl' },
                @{ n='fsspec';                     v='2025.7.0'; d='2025-08-15'; f='fsspec-2025.7.0-py3-none-any.whl' },
                @{ n='pandas';                     v='2.3.1';    d='2025-08-15'; f='pandas-2.3.1-cp313-cp313-win_amd64.whl' },
                @{ n='numpy';                      v='2.3.2';    d='2025-08-15'; f='numpy-2.3.2-cp313-cp313-win_amd64.whl' },
                @{ n='matplotlib';                 v='3.10.5';   d='2025-08-12'; f='matplotlib-3.10.5-cp313-cp313-win_amd64.whl' }
              )

              function Get-BootstrapPackageType($fileName) {
                if ($fileName -match 'cp313-cp313-win_amd64\.whl$') { return 'Python 3.13 64-bit wheel' }
                if ($fileName -match 'cp313-.*\.whl$')              { return 'Python 3.13 wheel' }
                if ($fileName -match 'py3-none-any\.whl$')           { return 'Universal wheel (Python 3+)' }
                if ($fileName -match 'py2\.py3-none-any\.whl$')     { return 'Universal wheel (Python 3+)' }
                if ($fileName -match '\.whl$')                       { return 'Wheel (check compatibility)' }
                if ($fileName -match '\.tar\.gz$')                  { return 'Source distribution' }
                return 'Unknown'
              }

              foreach ($b in $bootstrapEntries) {
                $bName    = $b.n
                $bVersion = $b.v
                $bTag     = if ($b.ContainsKey('tag') -and $b.tag) { $b.tag } elseif ($bVersion -eq 'latest') { "$bName-latest" } else { "$bName-v$bVersion" }
                $bUrl     = "https://github.com/$(GitHubOrg)/$(GitHubRepo)/releases/download/$bTag/$($b.f)"
                $bRelUrl  = "https://github.com/$(GitHubOrg)/$(GitHubRepo)/releases/tag/$bTag"
                $bType    = Get-BootstrapPackageType $b.f

                $bVersionEntry = [PSCustomObject]@{
                  version        = $bVersion
                  releaseTag     = $bTag
                  validationDate = $b.d
                  installUrl     = "pip install $bUrl"
                  packageType    = $bType
                  releaseUrl     = $bRelUrl
                  pipelineUrl    = ''
                  buildId        = ''
                  files          = @($b.f)
                  source         = 'bootstrap'
                }

                $bPkgEntry = [PSCustomObject]@{
                  name             = $bName
                  latestVersion    = $bVersion
                  latestReleaseTag = $bTag
                  versions         = @($bVersionEntry)
                }
                $manifest.packages | Add-Member -NotePropertyName $bName -NotePropertyValue $bPkgEntry -Force
              }

              $bootstrapPerformed = $true
              Write-Host "🌱 Bootstrapped packages.json with $($bootstrapEntries.Count) previously approved entries."
            }

            if (-not $manifest) {
              throw "packages.json could not be loaded or initialized."
            }

            if (-not $manifest.schemaVersion) {
              Set-ManifestProperty $manifest 'schemaVersion' 1
            }
            Set-ManifestProperty $manifest 'generatedAt' $generatedAt

            if (-not $manifest.packages) {
              Set-ManifestProperty $manifest 'packages' ([PSCustomObject]@{})
            }

            foreach ($packageProperty in @($manifest.packages.PSObject.Properties)) {
              $existingPackage = $packageProperty.Value
              Set-ManifestProperty $existingPackage 'name' $packageProperty.Name

              if (-not $existingPackage.versions) {
                Set-ManifestProperty $existingPackage 'versions' @()
              }

              $normalizedVersions = @()
              foreach ($existingVersion in @($existingPackage.versions)) {
                if (-not $existingVersion.version -or -not $existingVersion.releaseTag) {
                  Write-Host "⚠️ Skipping malformed version entry for $($packageProperty.Name) because version or releaseTag is missing."
                  continue
                }

                if (-not $existingVersion.validationDate) {
                  Set-ManifestProperty $existingVersion 'validationDate' ''
                }
                if (-not $existingVersion.installUrl) {
                  Set-ManifestProperty $existingVersion 'installUrl' ''
                }
                if (-not $existingVersion.packageType) {
                  Set-ManifestProperty $existingVersion 'packageType' 'Unknown'
                }
                if (-not $existingVersion.releaseUrl) {
                  Set-ManifestProperty $existingVersion 'releaseUrl' ''
                }
                if (-not $existingVersion.pipelineUrl) {
                  Set-ManifestProperty $existingVersion 'pipelineUrl' ''
                }
                if (-not $existingVersion.buildId) {
                  Set-ManifestProperty $existingVersion 'buildId' ''
                }
                if (-not $existingVersion.files) {
                  Set-ManifestProperty $existingVersion 'files' @()
                }

                $normalizedVersions += $existingVersion
              }

              Set-ManifestProperty $existingPackage 'versions' $normalizedVersions

              if (-not $existingPackage.latestVersion -and $normalizedVersions.Count -gt 0) {
                Set-ManifestProperty $existingPackage 'latestVersion' $normalizedVersions[0].version
              }
              if (-not $existingPackage.latestReleaseTag -and $existingPackage.latestVersion) {
                $latestVersionEntry = @($normalizedVersions | Where-Object { $_.version -eq $existingPackage.latestVersion } | Select-Object -First 1)
                if ($latestVersionEntry.Count -gt 0) {
                  Set-ManifestProperty $existingPackage 'latestReleaseTag' $latestVersionEntry[0].releaseTag
                }
              }
            }

            # Build the per-version entry that will live under packages.<name>.versions
            $versionEntry = [PSCustomObject]@{
              version        = $versionDisplay
              releaseTag     = $releaseTag
              validationDate = $validationDate
              installUrl     = $installCmd
              packageType    = $installType
              releaseUrl     = $releaseUrl
              pipelineUrl    = $pipelineUrl
              buildId        = "$(Build.BuildId)"
              files          = $packageFileNames
            }

            # Get or create the package-level entry
            if ($manifest.packages.PSObject.Properties.Name -contains $pkgName) {
              $pkgEntry = $manifest.packages.$pkgName
            } else {
              $pkgEntry = [PSCustomObject]@{
                name             = $pkgName
                latestVersion    = $versionDisplay
                latestReleaseTag = $releaseTag
                versions         = @()
              }
              $manifest.packages | Add-Member -NotePropertyName $pkgName -NotePropertyValue $pkgEntry -Force
            }
            if (-not $pkgEntry.versions) {
              $pkgEntry | Add-Member -NotePropertyName versions -NotePropertyValue @() -Force
            }

            # Same-version rerun policy: update entry in place, never duplicate, never remove others.
            $existing = @($pkgEntry.versions | Where-Object { $_.version -eq $versionDisplay })
            if ($existing.Count -gt 0) {
              Write-Host "Version $versionDisplay already present in manifest for $pkgName - updating that entry in place."
              $rebuilt = @()
              foreach ($v in $pkgEntry.versions) {
                if ($v.version -eq $versionDisplay) { $rebuilt += $versionEntry } else { $rebuilt += $v }
              }
              $pkgEntry.versions = $rebuilt
            } else {
              Write-Host "Appending new version $versionDisplay for $pkgName to manifest."
              $pkgEntry.versions = @($pkgEntry.versions) + $versionEntry
            }

            # Decide whether to advance the "latest" pointer.
            #   - Same version as current latest        -> no-op (pointer already correct)
            #   - New version is "latest" placeholder
            #     while a numeric latest already exists -> keep numeric latest (don't downgrade)
            #   - Both numeric                          -> semver compare; only advance if new >= old
            #   - Compare failure or one side missing   -> default to advancing (most recent wins)
            $shouldUpdateLatest = $true
            $existingLatest = $pkgEntry.latestVersion
            if ($existingLatest) {
              if ($versionDisplay -eq $existingLatest) {
                # Same version rerun; latestReleaseTag should also match, so this is effectively a no-op.
              } elseif ($versionDisplay -eq 'latest' -and $existingLatest -ne 'latest') {
                $shouldUpdateLatest = $false
                Write-Host "Publishing under 'latest' alias while numeric latestVersion '$existingLatest' exists; keeping numeric latest pointer."
              } elseif ($existingLatest -eq 'latest' -and $versionDisplay -ne 'latest') {
                $shouldUpdateLatest = $false
                Write-Host "Existing latest pointer uses the 'latest' alias; keeping it while backfilling numeric version '$versionDisplay'."
              } elseif ($existingLatest -ne 'latest' -and $versionDisplay -ne 'latest') {
                try {
                  $cleanNew = ($versionDisplay -replace '[^0-9.].*$','').Trim('.')
                  $cleanOld = ($existingLatest  -replace '[^0-9.].*$','').Trim('.')
                  if ($cleanNew -and $cleanOld) {
                    $newSemver = [version]$cleanNew
                    $oldSemver = [version]$cleanOld
                    if ($newSemver -lt $oldSemver) {
                      $shouldUpdateLatest = $false
                      Write-Host "Republished an older version ($versionDisplay < $existingLatest); keeping existing latest pointer."
                    }
                  }
                } catch {
                  Write-Host "Semver compare failed; defaulting to advancing latest pointer."
                }
              }
            }
            if ($shouldUpdateLatest) {
              $pkgEntry.latestVersion    = $versionDisplay
              $pkgEntry.latestReleaseTag = $releaseTag
            }

            $manifest.generatedAt = $generatedAt

            # Persist manifest
            $manifest | ConvertTo-Json -Depth 10 | Out-File -FilePath $manifestPath -Encoding UTF8
            Write-Host "📄 Updated $manifestPath"

            # Regenerate README.md from the manifest (README is derived output, not the datastore)
            $readme = New-Object System.Text.StringBuilder
            [void]$readme.AppendLine("# 🔒 Security Validated Python Packages")
            [void]$readme.AppendLine("")
            [void]$readme.AppendLine("This repository contains Python packages validated through automated security scanning and manual approval.")
            [void]$readme.AppendLine("")
            [void]$readme.AppendLine("> The canonical package index is [``packages.json``](./packages.json). This README is generated from that manifest and should not be edited by hand.")
            [void]$readme.AppendLine("")
            [void]$readme.AppendLine("## 📋 Requirements")
            [void]$readme.AppendLine("- **Python 3.13.x** (required for compatibility)")
            [void]$readme.AppendLine("- **Windows 64-bit** environment")
            [void]$readme.AppendLine("")
            [void]$readme.AppendLine("## 📦 Available Packages (latest validated version)")
            [void]$readme.AppendLine("")
            [void]$readme.AppendLine("| Package | Latest Version | Validated | Install (latest) | Versions |")
            [void]$readme.AppendLine("|---------|----------------|-----------|------------------|----------|")

            $pkgNames = @($manifest.packages.PSObject.Properties.Name | Sort-Object)
            foreach ($name in $pkgNames) {
              $entry        = $manifest.packages.$name
              $latestVer    = $entry.latestVersion
              $latestEntry  = $entry.versions | Where-Object { $_.version -eq $latestVer } | Select-Object -First 1
              $latestInst   = if ($latestEntry) { $latestEntry.installUrl }     else { "" }
              $latestDate   = if ($latestEntry) { $latestEntry.validationDate } else { "" }
              $versionsSummary = @($entry.versions) | Sort-Object -Property validationDate -Descending | ForEach-Object {
                "$($_.version) ($($_.validationDate), $($_.packageType))"
              }
              $versionsCell = if ($versionsSummary.Count -gt 0) {
                "<details><summary>$($entry.versions.Count) version(s)</summary><br/><ul><li>" + ($versionsSummary -join '</li><li>') + "</li></ul></details>"
              } else {
                "No versions recorded"
              }
              [void]$readme.AppendLine("| ``$name`` | ``$latestVer`` | $latestDate | ``$latestInst`` | $versionsCell |")
            }

            [void]$readme.AppendLine("")
            [void]$readme.AppendLine("## 🗂️ Version History")
            [void]$readme.AppendLine("")
            foreach ($name in $pkgNames) {
              $entry = $manifest.packages.$name
              [void]$readme.AppendLine("### ``$name``")
              [void]$readme.AppendLine("")
              [void]$readme.AppendLine("| Version | Validated | Type | Install | Release | Files |")
              [void]$readme.AppendLine("|---------|-----------|------|---------|---------|-------|")
              $sortedVersions = @($entry.versions) | Sort-Object -Property validationDate -Descending
              foreach ($v in $sortedVersions) {
                $filesDisplay = if ($v.files) { @($v.files) -join ', ' } else { '' }
                $releaseDisplay = if ($v.releaseUrl) { "[release]($($v.releaseUrl))" } else { '' }
                [void]$readme.AppendLine("| ``$($v.version)`` | $($v.validationDate) | $($v.packageType) | ``$($v.installUrl)`` | $releaseDisplay | ``$filesDisplay`` |")
              }
              [void]$readme.AppendLine("")
            }

            $currentTimestamp = Get-Date -Format 'yyyy-MM-dd HH:mm UTC'
            [void]$readme.AppendLine("*Generated from ``packages.json`` on $currentTimestamp*")

            $readme.ToString() | Out-File -FilePath "README.md" -Encoding UTF8 -NoNewline
            Write-Host "📘 Regenerated README.md from manifest"

            # Commit and push manifest + README together
            git config user.name "Azure DevOps Pipeline"
            git config user.email "noreply@azuredevops.com"
            git add packages.json README.md

            $commitSucceeded = $false
            try {
              $commitMsg = if ($bootstrapPerformed) {
                "📦 Bootstrap packages.json + publish $(PackageName) v$versionDisplay"
              } else {
                "📦 Publish $(PackageName) v$versionDisplay (manifest update)"
              }
              git commit -m $commitMsg
              $commitSucceeded = $true
            } catch {
              Write-Host "No manifest/README changes to commit"
            }

            if ($commitSucceeded) {
              $pushSucceeded = $false
              try {
                git push origin main
                $pushSucceeded = $true
              } catch {
                Write-Host "Push to main failed, attempting master..."
                try {
                  git push origin master
                  $pushSucceeded = $true
                } catch {
                  Write-Host "❌ Failed to push manifest/README updates to both main and master"
                  Write-Host $_.Exception.Message
                  exit 1
                }
              }
              if (-not $pushSucceeded) {
                Write-Host "❌ Failed to push manifest/README updates"
                exit 1
              }
            }

            cd ..
            Remove-Item -Recurse -Force temp_repo

            Write-Host "📋 Package manifest updated successfully"
            Write-Host "🎉 Package $(PackageName) v$versionDisplay is now available!"
          } catch {
            Write-Host "❌ Failed to publish package / update manifest"
            Write-Host $_.Exception.Message
            exit 1
          }
          
          # Reset exit code to ensure pipeline continues
          $LASTEXITCODE = 0
          Write-Host "✅ Package publish completed successfully"
