            $commitMsg = if ($bootstrapPerformed) { "Bootstrap packages.json + publish $($env:PACKAGE_NAME) v$versionDisplay" } else { "Publish $($env:PACKAGE_NAME) v$versionDisplay (manifest update)" }
            git commit -m $commitMsg
            try {
              git push origin main
            } catch {
              git push origin master
            }
          } catch {
            Write-Host 'No manifest or README changes to commit.'
          }