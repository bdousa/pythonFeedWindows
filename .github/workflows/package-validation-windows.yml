name: Package Validation Windows

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: Python package name to validate and publish
        required: true
        type: string
      package_version:
        description: Leave blank or use latest for newest version
        required: false
        default: latest
        type: string
      publish_to_feed:
        description: Publish release plus README/packages.json updates to this repo after approval
        required: true
        default: false
        type: boolean

defaults:
  run:
    shell: pwsh

env:
  PACKAGE_NAME: ${{ inputs.package_name }}
  PACKAGE_VERSION: ${{ inputs.package_version }}
  TARGET_GITHUB_ORG: ${{ github.repository_owner }}
  TARGET_GITHUB_REPO: ${{ github.event.repository.name }}
  SNYK_ORG: ${{ secrets.SNYK_ORG }}
  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  security-scan:
    name: Security Vetting Stage
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Resolve canonical package name
        run: |
          $requested = "${{ inputs.package_name }}".Trim()
          $canonical = switch ($requested.ToLowerInvariant()) {
            'airflow' { 'apache-airflow'; break }
            'jupyter-notebook' { 'notebook'; break }
            default { $requested }
          }

          "REQUESTED_PACKAGE_NAME=$requested" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PACKAGE_NAME=$canonical" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          if ($canonical -ne $requested) {
            Write-Host "Using canonical PyPI package '$canonical' for requested package '$requested'."
          }

      - name: Setup Python virtual environment
        run: |
          python -m venv venv
          .\venv\Scripts\Activate.ps1
          python -m pip install --upgrade pip setuptools wheel

      - name: Download, install and extract package plus dependencies
        run: |
          .\venv\Scripts\Activate.ps1
          New-Item -ItemType Directory -Force -Path package_download | Out-Null
          New-Item -ItemType Directory -Force -Path package_extracted | Out-Null

          if ([string]::IsNullOrWhiteSpace($env:PACKAGE_VERSION) -or $env:PACKAGE_VERSION -eq 'latest') {
            pip download $env:PACKAGE_NAME --dest package_download
          } else {
            pip download "$($env:PACKAGE_NAME)==$($env:PACKAGE_VERSION)" --dest package_download
          }

          Write-Host "Installing $env:PACKAGE_NAME and dependencies..."
          if ([string]::IsNullOrWhiteSpace($env:PACKAGE_VERSION) -or $env:PACKAGE_VERSION -eq 'latest') {
            pip install $env:PACKAGE_NAME
          } else {
            pip install "$($env:PACKAGE_NAME)==$($env:PACKAGE_VERSION)"
          }

          Push-Location package_download
          Get-ChildItem | ForEach-Object {
            Write-Host "Extracting: $($_.Name)"
            if ($_.Name -like '*.whl') {
              $tempZipName = $_.Name -replace '\.whl$', '.zip'
              Copy-Item $_.Name $tempZipName
              try {
                Expand-Archive -Path $tempZipName -DestinationPath "..\package_extracted\$($_.Name)-extracted" -Force
                Remove-Item $tempZipName -Force
              } catch {
                Write-Host "Warning: Could not extract $($_.Name) - $($_.Exception.Message)"
                Remove-Item $tempZipName -Force -ErrorAction SilentlyContinue
              }
            } elseif ($_.Name -like '*.tar.gz') {
              try {
                tar -xzf $_.Name -C ..\package_extracted
              } catch {
                Write-Host "Warning: Could not extract $($_.Name) - $($_.Exception.Message)"
              }
            }
          }
          Pop-Location

          Write-Host 'Package extraction completed. Directory structure:'
          Get-ChildItem -Path package_extracted -Directory -Recurse -Depth 1

      - name: Run comprehensive Snyk scanning
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if (-not $env:SNYK_TOKEN) {
            throw 'Missing required secret: SNYK_TOKEN'
          }
          if (-not $env:SNYK_ORG) {
            throw 'Missing required secret: SNYK_ORG'
          }

          npm install -g snyk
          snyk auth $env:SNYK_TOKEN
          if ($LASTEXITCODE -ne 0) {
            throw 'Snyk authentication failed. Check the SNYK_TOKEN repository secret.'
          }

          .\venv\Scripts\Activate.ps1
          pip freeze > requirements.txt
          Write-Host '=== Installed packages for scanning ==='
          Get-Content requirements.txt
          $lineCount = (Get-Content requirements.txt | Measure-Object -Line).Lines
          Write-Host "=== Total packages: $lineCount ==="

          $venvPython = (Resolve-Path .\venv\Scripts\python.exe).Path

          Write-Host '=== Scanning dependencies for known vulnerabilities ==='
          snyk test --file=requirements.txt --package-manager=pip --skip-unresolved=true --command=$venvPython --org=$env:SNYK_ORG --json-file-output=snyk_dependencies.json *> snyk_dependencies_summary.txt
          $dependencyExitCode = $LASTEXITCODE
          $dependencyExitCode | Out-File -FilePath snyk_dependencies_exit_code.txt -Encoding utf8
          if ($dependencyExitCode -eq 0) {
            Write-Host 'Dependency scan completed successfully'
          } else {
            Write-Host "Snyk dependency test completed with issues. Exit code: $dependencyExitCode"
          }

          Write-Host '=== Uploading dependency scan to Snyk dashboard ==='
          snyk monitor --file=requirements.txt --package-manager=pip --skip-unresolved=true --command=$venvPython --org=$env:SNYK_ORG --project-name="$($env:PACKAGE_NAME)-deps-$env:GITHUB_RUN_NUMBER" *> snyk_monitor_summary.txt
          $monitorExitCode = $LASTEXITCODE
          $monitorExitCode | Out-File -FilePath snyk_monitor_exit_code.txt -Encoding utf8
          if ($monitorExitCode -eq 0) {
            Write-Host 'Dashboard upload completed successfully'
          } else {
            Write-Host "Snyk monitor completed with issues. Exit code: $monitorExitCode"
          }

          Write-Host '=== Scanning source code for security vulnerabilities ==='
          snyk code test --json-file-output=snyk_code.json package_extracted *> snyk_code_summary.txt
          $codeExitCode = $LASTEXITCODE
          $codeExitCode | Out-File -FilePath snyk_code_exit_code.txt -Encoding utf8
          if ($codeExitCode -eq 0) {
            Write-Host 'Source code scan completed successfully'
          } else {
            Write-Host "Snyk code test completed with issues. Exit code: $codeExitCode"
            Write-Host 'This may be normal if vulnerabilities were found or if code analysis is not available for this package type'
          }

          $LASTEXITCODE = 0

      - name: Ready for manual approval review instructions
        run: |
          .\venv\Scripts\Activate.ps1
          pip install requests

          Write-Host '=========================================='
          Write-Host '  PACKAGE READY FOR SECURITY REVIEW'
          Write-Host '=========================================='
          Write-Host "Package: $env:PACKAGE_NAME"
          Write-Host "Version: $env:PACKAGE_VERSION"
          Write-Host "Run URL: $env:RUN_URL"
          Write-Host ''

          $env:PACKAGE_NAME_FOR_ANALYSIS = $env:PACKAGE_NAME
          $pythonScript = @'
          import os
          import requests
          from datetime import datetime, timezone

          def safe_parse_datetime(dt_string):
              if not dt_string:
                  return None
              try:
                  if dt_string.endswith('Z'):
                      dt_string = dt_string[:-1] + '+00:00'
                  dt = datetime.fromisoformat(dt_string)
                  if dt.tzinfo is None:
                      dt = dt.replace(tzinfo=timezone.utc)
                  return dt
              except Exception:
                  return None

          package_name = os.environ.get('PACKAGE_NAME_FOR_ANALYSIS', '').replace('_', '-')
          if not package_name:
              print('ERROR: No package name provided for analysis')
              raise SystemExit(0)

          print('PACKAGE ANALYSIS:')
          print('=' * 40)
          try:
              response = requests.get(f'https://pypi.org/pypi/{package_name}/json', timeout=30)
              if response.status_code != 200:
                  print(f'WARNING: Package not found on PyPI: {package_name}')
                  raise SystemExit(0)

              data = response.json()
              info = data['info']
              releases = data['releases']
              print(f"Name: {info['name']}")
              print(f"Latest Version: {info['version']}")
              summary = info.get('summary') or ''
              print(f"Summary: {summary[:80]}..." if len(summary) > 80 else f"Summary: {summary}")
              print(f"Author: {info.get('author') or 'Not specified'}")
              print(f"Maintainer: {info.get('maintainer') or 'Same as author'}")

              license_info = info.get('license', 'Not specified')
              classifiers = info.get('classifiers', [])
              license_classifiers = [c for c in classifiers if c.startswith('License ::')]
              print(f'License: {license_info}')
              for classifier in license_classifiers[:2]:
                  print(f"    Classifier: {classifier.split('::')[-1].strip()}")

              problematic_indicators = ['gpl', 'agpl', 'copyleft', 'viral']
              license_text = (license_info or '').lower() + ' ' + ' '.join(license_classifiers).lower()
              if license_text.strip() and any(indicator in license_text for indicator in problematic_indicators):
                  print('WARNING: Potentially restrictive license detected!')

              os_classifiers = [c for c in classifiers if c.startswith('Operating System ::')]
              print('Operating System Compatibility:')
              if os_classifiers:
                  for os_classifier in os_classifiers:
                      os_name = os_classifier.split('::')[-1].strip() if '::' in os_classifier else os_classifier
                      print(f'    {os_name}')
                  windows_specific = any('Microsoft' in c and 'Windows' in c for c in os_classifiers)
                  os_independent = any('OS Independent' in c for c in os_classifiers)
                  if windows_specific:
                      print('OK: Package supports Windows (excellent for Windows pipeline)')
                  elif os_independent:
                      print('OK: Package is OS Independent (recommended)')
                  else:
                      print('CAUTION: Package has specific OS requirements - review carefully')
              else:
                  print('    UNKNOWN: No OS compatibility information specified')
                  print('WARNING: Packages without OS compatibility info should be reviewed carefully')

              all_upload_times = []
              for _, files in releases.items():
                  for file_info in files or []:
                      upload_time = safe_parse_datetime(file_info.get('upload_time', ''))
                      if upload_time:
                          all_upload_times.append(upload_time)

              first_release_time = None
              latest_release_time = None
              if all_upload_times:
                  all_upload_times.sort()
                  first_release_time = all_upload_times[0]
                  latest_release_time = all_upload_times[-1]
                  now_utc = datetime.now(timezone.utc)
                  days_ago = (now_utc - latest_release_time).days
                  print(f"Last Release: {latest_release_time.strftime('%Y-%m-%d')} ({days_ago} days ago)")

              repo_urls = []
              for url_type in ['home_page', 'download_url', 'project_url']:
                  url = info.get(url_type)
                  if url and any(host in url for host in ['github.com', 'gitlab.com', 'bitbucket.org']):
                      repo_urls.append(url)
              for _, url in (info.get('project_urls') or {}).items():
                  if url and any(host in url for host in ['github.com', 'gitlab.com', 'bitbucket.org']):
                      repo_urls.append(url)
              print(f"Repository: {repo_urls[0]}" if repo_urls else f"Repository: https://pypi.org/project/{package_name}/")

              print('\nSECURITY RISK ASSESSMENT:')
              print('-' * 30)
              now_utc = datetime.now(timezone.utc)
              if first_release_time:
                  package_age_days = (now_utc - first_release_time).days
                  print(f'Package Age: {package_age_days} days ({package_age_days // 365} years)')
              if latest_release_time:
                  days_since_last = (now_utc - latest_release_time).days
                  if days_since_last > 365:
                      print('CRITICAL: Package not updated in over a year')
                  elif days_since_last > 180:
                      print('WARNING: Package not updated in over 6 months')
                  elif days_since_last > 90:
                      print('CAUTION: Package not updated in over 3 months')
                  else:
                      print('OK: Recently maintained package')
          except requests.exceptions.RequestException as exc:
              print(f'ERROR: Error fetching package metadata: {exc}')
          except Exception as exc:
              print(f'ERROR: Unexpected error during analysis: {exc}')
          print('=' * 40)
          '@

          $pythonScript | Out-File -FilePath package_analysis.py -Encoding utf8
          python package_analysis.py

          Write-Host ''
          Write-Host 'SECURITY SCAN RESULTS:'
          Write-Host '========================================'
          Write-Host 'DEPENDENCY OVERVIEW:'
          if (Test-Path requirements.txt) {
            $allDeps = Get-Content requirements.txt | Where-Object { $_ -match '^[a-zA-Z]' }
            $filteredDeps = $allDeps | Where-Object {
              $_ -notmatch "^$($env:PACKAGE_NAME)" -and
              $_ -notmatch '^setuptools' -and
              $_ -notmatch '^wheel' -and
              $_ -notmatch '^pip'
            }
            $actualDepCount = $filteredDeps.Count
            $totalDeps = $actualDepCount + 1
            Write-Host "   Total dependencies to review: $totalDeps"
            Write-Host "   Package being reviewed: $env:PACKAGE_NAME"
          }

          Write-Host ''
          Write-Host 'PACKAGE VULNERABILITIES:'
          if (Test-Path snyk_dependencies_summary.txt) {
            Get-Content snyk_dependencies_summary.txt
          }

          Write-Host ''
          Write-Host 'SOURCE CODE ANALYSIS:'
          if (Test-Path snyk_code_summary.txt) {
            Get-Content snyk_code_summary.txt
          }

          Write-Host ''
          Write-Host 'NEXT: Manual approval required in PackageApproval environment'

      - name: Generate manifest and README preview
        run: |
          New-Item -ItemType Directory -Force -Path preview_output | Out-Null
          python scripts/manifest_tools.py upsert-release `
            --manifest-path packages.json `
            --manifest-output preview_output/packages.preview.json `
            --readme-output preview_output/README.preview.md `
            --package-name $env:PACKAGE_NAME `
            --package-version $env:PACKAGE_VERSION `
            --package-dir package_download `
            --repo-owner $env:TARGET_GITHUB_ORG `
            --repo-name $env:TARGET_GITHUB_REPO `
            --pipeline-url $env:RUN_URL `
            --build-id $env:GITHUB_RUN_ID

      - name: Build Python approval report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path review_output | Out-Null
          python scripts/build_review_report.py `
            --package-name $env:PACKAGE_NAME `
            --package-version $env:PACKAGE_VERSION `
            --requirements requirements.txt `
            --snyk-dependencies-summary snyk_dependencies_summary.txt `
            --snyk-dependencies-exit-code snyk_dependencies_exit_code.txt `
            --snyk-monitor-summary snyk_monitor_summary.txt `
            --snyk-monitor-exit-code snyk_monitor_exit_code.txt `
            --snyk-code-summary snyk_code_summary.txt `
            --snyk-code-exit-code snyk_code_exit_code.txt `
            --snyk-dependencies-json snyk_dependencies.json `
            --snyk-code-json snyk_code.json `
            --manifest-preview preview_output/packages.preview.json `
            --package-dir package_download `
            --run-url $env:RUN_URL `
            --output-dir review_output

      - name: Run AI security review
        if: always()
        env:
          AZURE_AI_FOUNDRY_API_KEY: ${{ secrets.AZURE_AI_FOUNDRY_API_KEY }}
          AZURE_AI_FOUNDRY_ENDPOINT: ${{ secrets.AZURE_AI_FOUNDRY_ENDPOINT }}
        run: |
          if (-not (Test-Path review_output/approval-report.json)) {
            Write-Host "approval-report.json missing; skipping AI security review."
            exit 0
          }
          python scripts/build_ai_security_review.py `
            --report-json review_output/approval-report.json `
            --report-md review_output/approval-report.md `
            --model gpt-5.4-mini

      - name: Append approval report to step summary
        if: always()
        run: |
          if (Test-Path review_output/approval-report.md) {
            Get-Content review_output/approval-report.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: package-validation-${{ github.run_id }}
          path: |
            requirements.txt
            snyk_dependencies_summary.txt
            snyk_dependencies_exit_code.txt
            snyk_monitor_summary.txt
            snyk_monitor_exit_code.txt
            snyk_code_summary.txt
            snyk_code_exit_code.txt
            snyk_dependencies.json
            snyk_code.json
            package_analysis.py
            preview_output/packages.preview.json
            preview_output/README.preview.md
            review_output/approval-report.json
            review_output/approval-report.md

  manual-approval:
    name: Manual Approval
    needs: security-scan
    runs-on: ubuntu-latest
    environment:
      name: PackageApproval
    steps:
      - name: Resolve canonical package name
        run: |
          $requested = "${{ inputs.package_name }}".Trim()
          $canonical = switch ($requested.ToLowerInvariant()) {
            'airflow' { 'apache-airflow'; break }
            'jupyter-notebook' { 'notebook'; break }
            default { $requested }
          }

          "REQUESTED_PACKAGE_NAME=$requested" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PACKAGE_NAME=$canonical" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Await approval
        run: echo "Manual approval granted for $PACKAGE_NAME"

  publish-artifact:
    name: Publish Package to GitHub Repository
    needs: manual-approval
    if: ${{ inputs.publish_to_feed }}
    runs-on: windows-latest
    concurrency:
      group: package-manifest-publish-main
      cancel-in-progress: false
      queue: max
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Download scan artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-validation-${{ github.run_id }}
          path: publish_inputs

      - name: Resolve canonical package name
        run: |
          $requested = "${{ inputs.package_name }}".Trim()
          $canonical = switch ($requested.ToLowerInvariant()) {
            'airflow' { 'apache-airflow'; break }
            'jupyter-notebook' { 'notebook'; break }
            default { $requested }
          }

          "REQUESTED_PACKAGE_NAME=$requested" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "PACKAGE_NAME=$canonical" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          if ($canonical -ne $requested) {
            Write-Host "Using canonical PyPI package '$canonical' for requested package '$requested'."
          }

      - name: Publish validated package
        env:
          GH_TOKEN: ${{ secrets.REPO_WRITE_TOKEN }}
          REPO_WRITE_TOKEN: ${{ secrets.REPO_WRITE_TOKEN }}
        run: |
          if (-not $env:GH_TOKEN) {
            throw 'Missing required secret: REPO_WRITE_TOKEN'
          }

          if (-not (Get-Command gh -ErrorAction SilentlyContinue)) {
            choco install gh --yes --no-progress
          }

          python -m pip install --upgrade pip setuptools wheel
          New-Item -ItemType Directory -Force -Path package_publish | Out-Null

          Write-Host "Downloading $env:PACKAGE_NAME for Python 3.13 Windows x64..."
          $downloadSuccessful = $false

          if ([string]::IsNullOrWhiteSpace($env:PACKAGE_VERSION) -or $env:PACKAGE_VERSION -eq 'latest') {
            try {
              pip download $env:PACKAGE_NAME --dest package_publish "--only-binary=:all:" --python-version 313 --platform win_amd64 2>&1
              if ((Get-ChildItem package_publish -File -ErrorAction SilentlyContinue | Measure-Object).Count -gt 0) { $downloadSuccessful = $true }
            } catch {
              Write-Host "Python 3.13 wheels not available: $($_.Exception.Message)"
            }
            if (-not $downloadSuccessful) {
              try {
                pip download $env:PACKAGE_NAME --dest package_publish "--only-binary=:all:" --platform win_amd64 2>&1
                if ((Get-ChildItem package_publish -File -ErrorAction SilentlyContinue | Measure-Object).Count -gt 0) { $downloadSuccessful = $true }
              } catch {
                Write-Host "Windows wheels not available: $($_.Exception.Message)"
              }
            }
            if (-not $downloadSuccessful) {
              try {
                pip download $env:PACKAGE_NAME --dest package_publish --no-binary=:all: 2>&1
                if ((Get-ChildItem package_publish -File -ErrorAction SilentlyContinue | Measure-Object).Count -gt 0) { $downloadSuccessful = $true }
              } catch {
                Write-Host "Source distributions not available: $($_.Exception.Message)"
              }
            }
          } else {
            try {
              pip download "$($env:PACKAGE_NAME)==$($env:PACKAGE_VERSION)" --dest package_publish "--only-binary=:all:" --python-version 313 --platform win_amd64 2>&1
              if ((Get-ChildItem package_publish -File -ErrorAction SilentlyContinue | Measure-Object).Count -gt 0) { $downloadSuccessful = $true }
            } catch {
              Write-Host "Python 3.13 wheels not available for version $env:PACKAGE_VERSION: $($_.Exception.Message)"
            }
            if (-not $downloadSuccessful) {
              try {
                pip download "$($env:PACKAGE_NAME)==$($env:PACKAGE_VERSION)" --dest package_publish "--only-binary=:all:" --platform win_amd64 2>&1
                if ((Get-ChildItem package_publish -File -ErrorAction SilentlyContinue | Measure-Object).Count -gt 0) { $downloadSuccessful = $true }
              } catch {
                Write-Host "Windows wheels not available for version $env:PACKAGE_VERSION: $($_.Exception.Message)"
              }
            }
            if (-not $downloadSuccessful) {
              try {
                pip download "$($env:PACKAGE_NAME)==$($env:PACKAGE_VERSION)" --dest package_publish --no-binary=:all: 2>&1
                if ((Get-ChildItem package_publish -File -ErrorAction SilentlyContinue | Measure-Object).Count -gt 0) { $downloadSuccessful = $true }
              } catch {
                Write-Host "Source distributions not available for version $env:PACKAGE_VERSION: $($_.Exception.Message)"
              }
            }
          }

          $packageFiles = Get-ChildItem package_publish -File -ErrorAction SilentlyContinue
          if (-not $downloadSuccessful -or $packageFiles.Count -eq 0) {
            throw 'No package files were downloaded to publish.'
          }

          gh repo view "$($env:TARGET_GITHUB_ORG)/$($env:TARGET_GITHUB_REPO)" --json name | Out-Null
          if ($LASTEXITCODE -ne 0) {
            throw "REPO_WRITE_TOKEN cannot access $($env:TARGET_GITHUB_ORG)/$($env:TARGET_GITHUB_REPO). Verify the PAT has Contents: Read and write and Metadata: Read access to this repository."
          }

          $actualVersion = ''
          $normalizedPackageName = $env:PACKAGE_NAME -replace '-', '_'
          if ([string]::IsNullOrWhiteSpace($env:PACKAGE_VERSION) -or $env:PACKAGE_VERSION -eq 'latest') {
            $wheelFile = @(
              Get-ChildItem package_publish -Filter "$normalizedPackageName-*.whl" -ErrorAction SilentlyContinue
              Get-ChildItem package_publish -Filter "$($env:PACKAGE_NAME)-*.whl" -ErrorAction SilentlyContinue
            ) | Select-Object -First 1
            if ($wheelFile -and $wheelFile.Name -match '^[^-]+-([0-9]+\.[0-9]+(?:\.[0-9]+)?[^-]*)-') {
              $actualVersion = $matches[1]
            }
            if (-not $actualVersion) {
              $tarFile = @(
                Get-ChildItem package_publish -Filter "$normalizedPackageName-*.tar.gz" -ErrorAction SilentlyContinue
                Get-ChildItem package_publish -Filter "$($env:PACKAGE_NAME)-*.tar.gz" -ErrorAction SilentlyContinue
              ) | Select-Object -First 1
              if ($tarFile) {
                $filename = $tarFile.BaseName -replace '\.tar$', ''
                foreach ($prefix in @("$normalizedPackageName-", "$($env:PACKAGE_NAME)-")) {
                  if ($filename.StartsWith($prefix)) {
                    $actualVersion = $filename.Substring($prefix.Length)
                    break
                  }
                }
              }
            }
            if (-not $actualVersion -or $actualVersion -notmatch '[0-9]+\.[0-9]+') {
              throw "Could not determine actual package version from downloaded files for $($env:PACKAGE_NAME)."
            }
          } else {
            $actualVersion = $env:PACKAGE_VERSION
          }

          if ($actualVersion -and $actualVersion -ne 'latest') {
            $releaseTag = "$($env:PACKAGE_NAME)-v$actualVersion"
            $versionDisplay = $actualVersion
          } else {
            $releaseTag = "$($env:PACKAGE_NAME)-latest"
            $versionDisplay = 'latest'
          }

          gh release view $releaseTag --repo "$($env:TARGET_GITHUB_ORG)/$($env:TARGET_GITHUB_REPO)" 2>$null | Out-Null
          $tagAlreadyExists = ($LASTEXITCODE -eq 0)
          $LASTEXITCODE = 0

          $wheelFiles = Get-ChildItem package_publish -Filter "$normalizedPackageName-*-cp313-cp313-win_amd64.whl" -ErrorAction SilentlyContinue
          if (-not $wheelFiles) { $wheelFiles = Get-ChildItem package_publish -Filter "$($env:PACKAGE_NAME)-*-cp313-cp313-win_amd64.whl" -ErrorAction SilentlyContinue }
          if ($wheelFiles) {
            $filename = $wheelFiles[0].Name
            $installCmd = "pip install https://github.com/$($env:TARGET_GITHUB_ORG)/$($env:TARGET_GITHUB_REPO)/releases/download/$releaseTag/$filename"
            $installType = 'Python 3.13 64-bit wheel'
          } else {
            $wheelFiles313 = Get-ChildItem package_publish -Filter "$normalizedPackageName-*-cp313-*.whl" -ErrorAction SilentlyContinue
            if (-not $wheelFiles313) { $wheelFiles313 = Get-ChildItem package_publish -Filter "$($env:PACKAGE_NAME)-*-cp313-*.whl" -ErrorAction SilentlyContinue }
            if ($wheelFiles313) {
              $filename = $wheelFiles313[0].Name
              $installCmd = "pip install https://github.com/$($env:TARGET_GITHUB_ORG)/$($env:TARGET_GITHUB_REPO)/releases/download/$releaseTag/$filename"
              $installType = 'Python 3.13 wheel'
            } else {
              $universalWheel = Get-ChildItem package_publish -Filter "$normalizedPackageName-*-py3-none-any.whl" -ErrorAction SilentlyContinue
              if (-not $universalWheel) { $universalWheel = Get-ChildItem package_publish -Filter "$($env:PACKAGE_NAME)-*-py3-none-any.whl" -ErrorAction SilentlyContinue }
              if ($universalWheel) {
                $filename = $universalWheel[0].Name
                $installCmd = "pip install https://github.com/$($env:TARGET_GITHUB_ORG)/$($env:TARGET_GITHUB_REPO)/releases/download/$releaseTag/$filename"
                $installType = 'Universal wheel (Python 3+)'
              } else {
                $anyWheel = Get-ChildItem package_publish -Filter "$normalizedPackageName-*.whl" -ErrorAction SilentlyContinue
                if (-not $anyWheel) { $anyWheel = Get-ChildItem package_publish -Filter "$($env:PACKAGE_NAME)-*.whl" -ErrorAction SilentlyContinue }
                if ($anyWheel) {
                  $filename = $anyWheel[0].Name
                  $installCmd = "pip install https://github.com/$($env:TARGET_GITHUB_ORG)/$($env:TARGET_GITHUB_REPO)/releases/download/$releaseTag/$filename"
                  $installType = 'Wheel (check compatibility)'
                } else {
                  $tarFile = Get-ChildItem package_publish -Filter "$normalizedPackageName-*.tar.gz" -ErrorAction SilentlyContinue
                  if (-not $tarFile) { $tarFile = Get-ChildItem package_publish -Filter "$($env:PACKAGE_NAME)-*.tar.gz" -ErrorAction SilentlyContinue }
                  if ($tarFile) {
                    $filename = $tarFile[0].Name
                    $installCmd = "pip install https://github.com/$($env:TARGET_GITHUB_ORG)/$($env:TARGET_GITHUB_REPO)/releases/download/$releaseTag/$filename"
                    $installType = 'Source distribution'
                  } else {
                    throw 'Could not determine a publishable file for install command generation.'
                  }
                }
              }
            }
          }

          $packageFilesList = ($packageFiles | ForEach-Object { "- $($_.Name)" }) -join "`n"
          $releaseNotes = @"
          Security Validated Package

          Package: $env:PACKAGE_NAME
          Version: $versionDisplay
          Validation Date: $(Get-Date -Format 'yyyy-MM-dd')
          Workflow Run: $env:RUN_URL

          Installation (Python 3.13 Required)
          $installCmd

          Package Type: $installType

          Security Status
          - Vulnerability scan passed or completed with findings review
          - Source code analysis completed
          - Manual security review approved
          - License compliance reviewed

          Package Files
          $packageFilesList
          "@
          $fallbackReleaseNotesFile = 'release-notes.md'
          $releaseNotes | Out-File -FilePath $fallbackReleaseNotesFile -Encoding utf8
          $approvalReportMarkdown = 'publish_inputs/review_output/approval-report.md'
          if (Test-Path $approvalReportMarkdown) {
            $releaseNotesFile = $approvalReportMarkdown
          } else {
            Write-Host 'Approval report Markdown not found. Falling back to generated release notes.'
            $releaseNotesFile = $fallbackReleaseNotesFile
          }

          if (-not $tagAlreadyExists) {
            gh release create $releaseTag --repo "$($env:TARGET_GITHUB_ORG)/$($env:TARGET_GITHUB_REPO)" --title "$($env:PACKAGE_NAME) v$versionDisplay - Security Validated" --notes-file $releaseNotesFile
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create GitHub release $releaseTag (exit $LASTEXITCODE)."
            }
          } else {
            gh release edit $releaseTag --repo "$($env:TARGET_GITHUB_ORG)/$($env:TARGET_GITHUB_REPO)" --title "$($env:PACKAGE_NAME) v$versionDisplay - Security Validated" --notes-file $releaseNotesFile
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to update GitHub release $releaseTag notes (exit $LASTEXITCODE)."
            }
          }

          foreach ($file in $packageFiles) {
            gh release upload $releaseTag $file.FullName --repo "$($env:TARGET_GITHUB_ORG)/$($env:TARGET_GITHUB_REPO)" --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload $($file.Name) to release $releaseTag (exit $LASTEXITCODE)."
            }
          }

          $reportFiles = @(
            'publish_inputs/review_output/approval-report.md',
            'publish_inputs/review_output/approval-report.json'
          ) | Where-Object { Test-Path $_ }
          foreach ($reportFile in $reportFiles) {
            gh release upload $releaseTag $reportFile --repo "$($env:TARGET_GITHUB_ORG)/$($env:TARGET_GITHUB_REPO)" --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload $reportFile to release $releaseTag (exit $LASTEXITCODE)."
            }
          }

          $remoteUrl = "https://x-access-token:$env:REPO_WRITE_TOKEN@github.com/${{ github.repository }}.git"
          git fetch $remoteUrl main
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to fetch latest main before manifest update (exit $LASTEXITCODE)."
          }
          git checkout -B main FETCH_HEAD
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to reset checkout to latest main before manifest update (exit $LASTEXITCODE)."
          }

          python scripts/manifest_tools.py upsert-release `
            --manifest-path packages.json `
            --manifest-output packages.json `
            --readme-output README.md `
            --package-name $env:PACKAGE_NAME `
            --package-version $env:PACKAGE_VERSION `
            --package-dir package_publish `
            --repo-owner $env:TARGET_GITHUB_ORG `
            --repo-name $env:TARGET_GITHUB_REPO `
            --pipeline-url $env:RUN_URL `
            --build-id $env:GITHUB_RUN_ID

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add packages.json README.md
          $diff = git diff --cached --name-only
          if (-not $diff) {
            Write-Host 'No manifest or README changes to commit.'
            return
          }
          git commit -m "Publish $($env:PACKAGE_NAME) v$versionDisplay (manifest update)"
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to commit manifest update (exit $LASTEXITCODE)."
          }
          git push $remoteUrl HEAD:main
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to push manifest update (exit $LASTEXITCODE)."
          }