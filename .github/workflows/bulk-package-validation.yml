name: Bulk Package Validation

# Dispatches the single-package validation workflow once per package listed in
# the workflow inputs. Each individual run still requires the PackageApproval
# gate before its publish job touches packages.json / README.md. Set
# publish_to_feed=false for a dry-run that just exercises the scans + AI review
# without modifying the manifest.

on:
  workflow_dispatch:
    inputs:
      publish_to_feed:
        description: 'Publish each package after manual approval'
        required: true
        default: true
        type: boolean
      package_version:
        description: 'Version requested for every package (use "latest" for current)'
        required: true
        default: 'latest'
        type: string
      package_list:
        description: 'Comma-separated package names to validate (example: requests,numpy,pyarrow)'
        required: true
        type: string
      delay_seconds:
        description: 'Seconds to wait between dispatches (avoid API throttling)'
        required: false
        default: '5'
        type: string

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  dispatch-validations:
    name: Dispatch per-package validation runs
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch package-validation-windows.yml for each listed package
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PACKAGE_VERSION: ${{ inputs.package_version }}
          PUBLISH_TO_FEED: ${{ inputs.publish_to_feed }}
          DELAY_SECONDS: ${{ inputs.delay_seconds }}
          PACKAGE_LIST: ${{ inputs.package_list }}
          TARGET_REF: ${{ github.ref_name }}
        run: |
          $packages = $env:PACKAGE_LIST.Split(',') |
            ForEach-Object { $_.Trim() } |
            Where-Object { $_ } |
            Sort-Object -Unique

          if (-not $packages -or $packages.Count -eq 0) {
            throw 'No packages selected for dispatch. Provide at least one package name in package_list.'
          }

          $delay = [int]($env:DELAY_SECONDS)
          if ($delay -lt 0) { $delay = 0 }

          Write-Host "Dispatching $($packages.Count) package(s) on ref '$env:TARGET_REF' with publish_to_feed=$env:PUBLISH_TO_FEED, package_version=$env:PACKAGE_VERSION."

          foreach ($package in $packages) {
            Write-Host "  -> $package"
            gh workflow run package-validation-windows.yml `
              --repo "$env:GH_REPO" `
              --ref "$env:TARGET_REF" `
              -f package_name="$package" `
              -f package_version="$env:PACKAGE_VERSION" `
              -f publish_to_feed="$env:PUBLISH_TO_FEED"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to dispatch package-validation-windows.yml for $package."
            }
            if ($delay -gt 0) { Start-Sleep -Seconds $delay }
          }

          Write-Host "Dispatch complete. Each run still requires PackageApproval before publishing."
