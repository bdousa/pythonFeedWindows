name: Reveal Secret
on: workflow_dispatch # Allows you to trigger it manually

jobs:
  reveal:
    runs-on: ubuntu-latest
    steps:
      - name: Print obfuscated secret
        run: |
          echo "${{ secrets.AZURE_AI_FOUNDRY_API_KEY }}" | sed 's/./& /g'
          echo "${{ secrets.AZURE_AI_FOUNDRY_ENDPOINT }}" | sed 's/./& /g'
